#
# M5Stack Cardputer - Keyboard Logging Example
#
# Same hardware setup as m5cardputer-basic.yaml, plus a custom scanner
# (m5cardputer_keyboard.h) that logs each newly-pressed key to the
# ESPHome log. See docs/superpowers/specs/2026-05-16-m5cardputer-keyboard-design.md
#
esphome:
  name: m5cardputer
  friendly_name: M5Cardputer
  includes:
    - m5cardputer_keyboard.h
  on_boot:
    priority: -100
    then:
      - lambda: 'm5kb::init();'

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "M5Cardputer Fallback Hotspot"
    password: !secret ap_password

captive_portal:

i2s_audio:
  i2s_lrclk_pin: GPIO43
  i2s_bclk_pin: GPIO41

microphone:
  - platform: i2s_audio
    id: external_mic
    adc_type: external
    i2s_din_pin:
      number: GPIO46
      ignore_strapping_warning: true
    pdm: true

speaker:
  - platform: i2s_audio
    id: echo_speaker
    dac_type: external
    i2s_dout_pin: GPIO42
    channel: mono

media_player:
  - platform: speaker
    id: media_out
    name: ESPHome Speaker Media Player
    announcement_pipeline:
      speaker: echo_speaker
      num_channels: 1

spi:
  clk_pin: GPIO36
  mosi_pin: GPIO35
  miso_pin: GPIO39

display:
  platform: st7789v
  model: TTGO TDisplay 135x240
  backlight_pin: GPIO38
  cs_pin: GPIO37
  dc_pin: GPIO34
  reset_pin: GPIO33
  rotation: 90
  lambda: |-
    it.print(0, 0, id(roboto_20), "Press any key (see logs)");

font:
  - file: "gfonts://Roboto"
    id: roboto_20
    size: 20

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO00
      inverted: true
      ignore_strapping_warning: true
    name: Button
    id: btn

interval:
  - interval: 20ms
    then:
      - lambda: 'm5kb::scan();'
